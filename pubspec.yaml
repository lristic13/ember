name: ember
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 3.0.2+7

environment:
  sdk: ^3.8.1


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.0.3
  riverpod_annotation: ^3.0.3
  go_router: ^17.0.0
  hive_ce: ^2.19.0
  hive_ce_flutter: ^2.3.4
  uuid: ^4.5.2
  intl: ^0.20.2
  lottie: ^3.3.2
  dotlottie_loader: ^0.0.5
  google_fonts: ^7.0.0
  animations: ^2.1.1
  fl_chart: ^1.1.1
  share_plus: ^12.0.1
  path_provider: ^2.1.5
  home_widget: ^0.9.0
  upgrader: ^12.5.0
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0
  cloud_functions: ^6.3.2
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^7.0.1
  crypto: ^3.0.7
  flutter_svg: ^2.3.0
  flutter_reorderable_grid_view: ^5.7.0
  firebase_messaging: ^16.4.0
  firebase_app_check: ^0.4.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  riverpod_generator: ^3.0.0
  build_runner: ^2.4.14
  hive_ce_generator: ^1.9.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/ember_master_1024.png"
  adaptive_icon_background: "assets/icon/ember_adaptive_background.png"
  adaptive_icon_foreground: "assets/icon/ember_adaptive_foreground.png"
  remove_alpha_ios: true




flutter:


  uses-material-design: true

  assets:
    - assets/animations/
    - assets/icon/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
